<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feedback · Creator Club</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c41e3a;
            --primary-dark: #a01830;
            --primary-soft: #e03e5a;
            --secondary: #1a1a1a;
            --secondary-light: #2a2a2a;
            --success: #1cc88a;
            --dark: #1e293b;
            --gray-100: #f8f9fc;
            --gray-200: #eaeef5;
            --gray-300: #dde1e9;
            --gradient-start: #1a1a1a;
            --gradient-end: #2a2a2a;
            --card-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            --hover-shadow: 0 30px 60px -15px rgba(196,30,58,0.3);
            --glass-bg: rgba(255,255,255,0.85);
            --glass-border: rgba(255,255,255,0.6);
        }

        body {
            background: linear-gradient(145deg, #f8fafc 0%, #eef2f6 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== MOBILE HEADER ===== */
        .mobile-header {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 0.8rem 1.2rem;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1050;
            border-bottom: 2px solid var(--primary);
            align-items: center;
            justify-content: space-between;
        }

        .hamburger {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--primary);
            padding: 0 0.5rem;
        }

        .mobile-logo {
            height: 40px;
            width: auto;
        }

        .mobile-title {
            font-weight: 600;
            color: var(--dark);
        }



        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 280px;
            padding: 2rem;
            min-height: 100vh;
        }

        .back-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 0.7rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            color: var(--dark);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.8rem;
            transition: all 0.4s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(196,30,58,0.4);
            border-color: transparent;
        }

        .page-title {
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title i {
            color: var(--primary);
            background: rgba(196,30,58,0.1);
            padding: 0.8rem;
            border-radius: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 1.2rem 2rem;
            color: white;
            border-bottom: 4px solid var(--primary);
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header i {
            background: rgba(255,255,255,0.15);
            padding: 0.5rem;
            border-radius: 14px;
        }

        .table-responsive {
            border-radius: 0 0 32px 32px;
            overflow: hidden;
            background: white;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: var(--secondary);
            color: white;
            padding: 1.2rem 1rem;
            font-weight: 600;
            border: none;
        }

        .table tbody td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--gray-200);
        }

        .timestamp-badge {
            background: var(--gray-100);
            color: var(--dark);
            border: 1px solid var(--gray-200);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .designation-badge {
            background: rgba(196,30,58,0.1);
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        @media (max-width: 992px) {
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; padding-top: 5rem; }
        }
    </style>
</head>
<body>
    <!-- mobile header -->
    <div class="mobile-header">
        <button class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-title">Feedback</span>
        <img src="{{ url_for('static', filename='images/logo/cc.png') }}" alt="Logo" class="mobile-logo">
    </div>

    <!-- overlay -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

    <!-- sidebar -->
    {% include '_sidebar.html' %}

    <!-- main content -->
    <div class="main-content">
        <!-- back to dashboard -->
        <a href="/admin" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
            </svg>
            <span>Dashboard</span>
        </a>

        <h1 class="page-title">
            <i class="fas fa-comments"></i>
            User Feedback
        </h1>

        <!-- Feedback Card -->
        <div class="glass-card animate__animated animate__fadeInUp">
            <div class="card-header">
                <i class="fas fa-inbox"></i>
                <span>Received Feedback</span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="suggestionsTable">
                    <thead>
                        <tr>
                            <th>Submitter</th>
                            <th>Designation</th>
                            <th>Contact Info</th>
                            <th>Suggestion Details</th>
                            <th>Received On</th>
                        </tr>
                    </thead>
                    <tbody id="suggestionsBody">
                        <tr>
                            <td colspan="5" class="text-center py-4">
                                <i class="fas fa-spinner fa-spin fa-2x text-muted mb-2"></i><br>
                                <span class="text-muted">Loading feedback...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {


            // Load suggestions via AJAX
            function loadSuggestions() {
                fetch('/get_suggestions')
                    .then(res => res.json())
                    .then(data => {
                        const tbody = document.getElementById('suggestionsBody');
                        tbody.innerHTML = '';
                        
                        const suggestions = data.suggestions || [];
                        if (suggestions.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4"><i class="fas fa-comments fa-3x text-muted mb-3"></i><br><span class="text-muted">No suggestions received yet.</span></td></tr>';
                            return;
                        }
                        
                        suggestions.reverse().forEach(s => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td><strong>${escapeHtml(s.name)}</strong></td>
                                <td><span class="designation-badge">${escapeHtml(s.designation)}</span></td>
                                <td><code>${escapeHtml(s.contact_info || 'N/A')}</code></td>
                                <td>
                                    <div class="text-wrap" style="max-width: 400px; white-space: pre-line;">${escapeHtml(s.text)}</div>
                                    <small class="text-muted d-block mt-1"><i class="fas fa-globe me-1"></i>From page: ${escapeHtml(s.page || 'Unknown')}</small>
                                </td>
                                <td><span class="timestamp-badge">${escapeHtml(s.timestamp)}</span></td>
                            `;
                            tbody.appendChild(tr);
                        });
                    })
                    .catch(err => {
                        console.error('Error loading suggestions:', err);
                        document.getElementById('suggestionsBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4"><i class="fas fa-exclamation-triangle fa-2x mb-2"></i><br>Failed to load suggestions.</td></tr>';
                    });
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            }

            loadSuggestions();
        })();
    </script>
</body>
</html>
