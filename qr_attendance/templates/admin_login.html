<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · Creator Club (SEC)</title>
    <!-- Bootstrap 5 + Font Awesome 6 (same as original) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === HEADER (SAMISTI inspired, fully responsive) === */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .logo-text {
            font-size: 1.9rem;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .club-badge {
            background: #c41e3a;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .social-links {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .social-links a {
            color: #1a1a1a;
            font-size: 1.4rem;
            transition: all 0.25s ease;
            display: inline-flex;
        }

        .social-links a:hover {
            color: #c41e3a;
            transform: translateY(-3px);
        }

        /* === MAIN LOGIN CARD (pixel‑perfect & responsive) === */
        .login-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        .login-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            overflow: hidden;
            background: white;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08);
        }

        .card-header {
            background: #1a1a1a;
            color: white;
            padding: 2.2rem 2rem;
            text-align: center;
            border-bottom: none;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0.08) 0%,
                rgba(255, 255, 255, 0) 60%
            );
            transform: rotate(25deg);
            animation: shine 6s infinite ease;
        }

        @keyframes shine {
            0% { transform: rotate(25deg) translate(-20%, -20%); }
            100% { transform: rotate(25deg) translate(20%, 20%); }
        }

        .card-header i {
            color: #c41e3a;
        }

        .card-header h2 {
            font-weight: 600;
            font-size: 1.9rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card-body {
            padding: 2.5rem 2.2rem;
        }

        /* lock icon float */
        .float-icon {
            animation: float 5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        /* form elements */
        .form-label {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.4rem;
            font-size: 1rem;
        }

        .input-group {
            border-radius: 12px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(196, 30, 58, 0.2);
            border-radius: 12px;
        }

        .input-group-text {
            background: #f8f9fa;
            border: 1px solid #e2e4e8;
            border-right: none;
            color: #c41e3a;
            padding: 0.7rem 1rem;
        }

        .form-control {
            border: 1px solid #e2e4e8;
            border-left: none;
            padding: 0.7rem 0.8rem;
            font-size: 1rem;
            transition: border 0.2s;
        }

        .form-control:focus {
            border-color: #c41e3a;
            box-shadow: none;
            outline: none;
        }

        .toggle-password {
            border: 1px solid #e2e4e8;
            border-left: none;
            background: #f8f9fa;
            color: #1a1a1a;
            transition: all 0.2s;
        }

        .toggle-password:hover {
            background: #e9ecef;
            color: #c41e3a;
        }

        /* alert styling */
        .alert-custom {
            border-radius: 14px;
            border: none;
            padding: 1rem 1.2rem;
            margin-bottom: 2rem;
            animation: fadeSlide 0.4s ease;
            font-weight: 500;
        }

        .alert-custom.alert-danger {
            background: rgba(196, 30, 58, 0.07);
            color: #b81c36;
            border-left: 5px solid #c41e3a;
        }

        .alert-custom.alert-success {
            background: rgba(40, 167, 69, 0.06);
            color: #1e7e34;
            border-left: 5px solid #28a745;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* button – matching SAMISTI CTA */
        .btn-login {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: #1a1a1a;
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.15rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            margin: 1.8rem 0 1.2rem;
            text-decoration: none;
            line-height: 1.4;
        }

        .btn-login:hover {
            background: #2d2d2d;
            transform: translateY(-3px);
            color: white;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .btn-login i {
            color: #c41e3a;
            font-size: 1.2rem;
        }

        .back-home {
            text-align: center;
            margin-top: 0.5rem;
        }

        .back-home a {
            color: #5a5a5a;
            text-decoration: none;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
        }

        .back-home a:hover {
            color: #c41e3a;
            transform: translateX(-4px);
        }

        /* === FOOTER (exact match) === */
        .site-footer {
            background: #1a1a1a;
            color: white;
            padding: 2.5rem 1.5rem 1.5rem;
            margin-top: 2rem;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .copyright {
            color: #aaa;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1.8rem;
            margin-top: 1rem;
        }

        .copyright p {
            margin-bottom: 0.4rem;
        }

        .dev-link {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .dev-link:hover {
            color: #c41e3a;
            text-decoration: underline;
        }

        /* ===== RESPONSIVE TWEAKS (ensuring everything is perfect) ===== */
        @media (max-width: 768px) {
            .site-header {
                padding: 1rem 1.5rem;
            }
            .logo-text {
                font-size: 1.6rem;
            }
            .club-badge {
                font-size: 0.8rem;
                padding: 0.3rem 0.9rem;
            }
            .social-links a {
                font-size: 1.25rem;
            }
            .card-header h2 {
                font-size: 1.6rem;
            }
            .card-body {
                padding: 2rem 1.5rem;
            }
        }

        @media (max-width: 576px) {
            .site-header {
                flex-direction: column;
                align-items: flex-start;
                padding: 0.9rem 1.2rem;
            }
            .logo-group {
                width: 100%;
                justify-content: space-between;
            }
            .logo-text {
                font-size: 1.5rem;
                letter-spacing: -0.3px;
            }
            .club-badge {
                font-size: 0.75rem;
                padding: 0.25rem 0.8rem;
            }
            .social-links {
                width: 100%;
                justify-content: flex-end;
                gap: 1rem;
            }
            .social-links a {
                font-size: 1.2rem;
            }

            .login-section {
                padding: 1.2rem 1rem;
            }
            .card-header {
                padding: 1.8rem 1rem;
            }
            .card-header h2 {
                font-size: 1.4rem;
                gap: 6px;
            }
            .card-header i.fa-4x {
                font-size: 2.8rem;
            }
            .card-body {
                padding: 1.8rem 1.2rem;
            }
            .form-label {
                font-size: 0.95rem;
            }
            .input-group-text, .form-control {
                padding: 0.6rem 0.75rem;
            }
            .btn-login {
                padding: 0.8rem 1.5rem;
                font-size: 1.05rem;
            }
            .back-home a {
                font-size: 0.95rem;
            }
            .site-footer {
                padding: 2rem 1rem 1rem;
            }
        }

        @media (max-width: 400px) {
            .logo-group {
                flex-wrap: wrap;
                gap: 8px;
            }
            .logo-text {
                font-size: 1.3rem;
            }
            .club-badge {
                font-size: 0.7rem;
            }
            .card-header h2 {
                font-size: 1.25rem;
                flex-wrap: wrap;
            }
            .card-header i.fa-4x {
                font-size: 2.4rem;
            }
        }

        /* extra polish for flash fade out */
        .fade-out {
            animation: fadeOut 0.3s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-5px); }
        }
    </style>
</head>
<body>

   

    <!-- MAIN LOGIN SECTION (fully centered card) -->
    <section class="login-section">
        <div class="login-card">
            <div class="card-header">
                <div class="float-icon">
                    <i class="fas fa-lock fa-4x"></i>
                </div>
                <h2>
                    <i class="fas fa-user-shield"></i> 
                    Admin Login
                </h2>
            </div>
            <div class="card-body">
                <!-- flash messages (simulated with dummy example, but dynamic support) -->
                <div id="flash-messages">
                    <!-- example: uncomment to test
                    <div class="alert-custom alert-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i> Invalid credentials
                        <button type="button" class="btn-close float-end" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    -->
                    <!-- messages injected via template engine (flask) will appear here -->
                </div>

                <!-- LOGIN FORM (with csrf & validation placeholders) -->
                <form method="POST" action="{{ url_for('admin_login') }}" class="needs-validation" novalidate>
                    <!-- hidden CSRF (example) -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-2" style="color: #c41e3a;"></i>Username
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="Enter admin username" required>
                            <div class="invalid-feedback">Please enter your username.</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-key me-2" style="color: #c41e3a;"></i>Password
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter password" required>
                            <button class="btn btn-outline-secondary toggle-password" type="button">
                                <i class="fas fa-eye"></i>
                            </button>
                            <div class="invalid-feedback">Please enter your password.</div>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt"></i>
                        Login to Dashboard
                    </button>

                    <div class="back-home">
                        <a href="/">
                            <i class="fas fa-arrow-left"></i>
                            Back to Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>

  

    <!-- Bootstrap JS (for alert close & validation) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- small custom scripts (form validation + toggle + flash auto-dismiss + easter egg) -->
    <script>
        (function() {
            'use strict';

            // Bootstrap 5 form validation
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });

            // toggle password visibility
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', function() {
                    const input = this.closest('.input-group').querySelector('input');
                    const icon = this.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });

            // auto dismiss flash messages after 5 sec (if any)
            const flashContainer = document.getElementById('flash-messages');
            if (flashContainer.children.length > 0) {
                setTimeout(() => {
                    const alerts = flashContainer.querySelectorAll('.alert-custom');
                    alerts.forEach(alert => {
                        alert.classList.add('fade-out');
                        setTimeout(() => alert.remove(), 300);
                    });
                }, 5000);
            }

            // Konami code / admin shortcut (fun)
            let konamiIndex = 0;
            const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
            document.addEventListener('keydown', e => {
                // Ctrl+E : just a small message (since already on admin page)
                if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
                    e.preventDefault();
                    alert('🔐 Admin area — you\'re already here!');
                }
                // Konami
                if (e.key === konamiCode[konamiIndex]) {
                    konamiIndex++;
                    if (konamiIndex === konamiCode.length) {
                        alert('🎮 Welcome, Admin! Konami code activated.');
                        konamiIndex = 0;
                    }
                } else {
                    konamiIndex = 0;
                }
            });

            // optional: simulate flash message for demo (just to showcase styling)
            // (only if container empty) – uncomment if you want to see a demo message
            // if (!flashContainer.children.length) {
            //     const demoFlash = document.createElement('div');
            //     demoFlash.className = 'alert-custom alert-danger';
            //     demoFlash.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i> Sample: invalid login (demo) <button type="button" class="btn-close float-end" data-bs-dismiss="alert" aria-label="Close"></button>';
            //     flashContainer.appendChild(demoFlash);
            //     setTimeout(() => demoFlash.remove(), 4000);
            // }
        })();
    </script>

    <!-- ensure all links are safe and no conflicts -->
</body>
</html>
