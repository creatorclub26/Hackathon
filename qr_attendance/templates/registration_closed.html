<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Closed · Creator Club</title>
    <!-- Favicon -->
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dvfqvqbkn/image/upload/v1752482876/cc_lbohfd.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        
        .closed-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            margin: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .icon {
            font-size: 5rem;
            color: #c41e3a;
            margin-bottom: 1rem;
        }
        
        h1 {
            color: #1a1a1a;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .message {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #c41e3a;
        }
        
        .btn {
            background: linear-gradient(135deg, #c41e3a 0%, #a01830 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(196,30,58,0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(196,30,58,0.4);
            color: white;
        }
        
        .logo {
            margin-bottom: 2rem;
        }
        
        .logo img {
            max-height: 60px;
        }
        
        @media (max-width: 576px) {
            .closed-card {
                padding: 2rem;
                margin: 1rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="closed-card">
        <div class="logo">
            <img src="https://res.cloudinary.com/dvfqvqbkn/image/upload/v1752482876/cc_lbohfd.png" alt="Creator Club" style="max-height: 60px;">
        </div>
        
        <div class="icon">
            <i class="fas fa-lock"></i>
        </div>
        
        <h1>Registrations Closed</h1>
        
        <div class="message">
            {{ message }}
        </div>
        
        <a href="/" class="btn">
            <i class="fas fa-home me-2"></i>Back to Home
        </a>
    </div>
</body>
</html>
