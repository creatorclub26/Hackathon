<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Admin Panel{% endblock %} · Creator Club</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ===== RESET & ROOT ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:       #c41e3a;
            --primary-dark:  #a01830;
            --primary-soft:  #e03e5a;
            --secondary:     #1a1a1a;
            --success:       #1cc88a;
            --dark:          #1e293b;
            --gray-100:      #f8f9fc;
            --gray-200:      #eaeef5;
            --glass-bg:      rgba(255,255,255,0.92);
            --glass-border:  rgba(255,255,255,0.6);
            --sidebar-w:     280px;
            --header-h:      60px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #e8edf5 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        /* ===== MOBILE HEADER ===== */
        .ab-mobile-header {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 0.75rem 1.2rem;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1050;
            border-bottom: 3px solid var(--primary);
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            height: var(--header-h);
        }

        .ab-hamburger {
            background: none;
            border: none;
            font-size: 1.7rem;
            color: var(--primary);
            padding: 0 0.4rem;
            cursor: pointer;
            line-height: 1;
        }

        .ab-mobile-logo { height: 36px; width: auto; }
        .ab-mobile-title { font-weight: 700; font-size: 0.95rem; color: var(--dark); }



        /* ===== MAIN WRAPPER ===== */
        .ab-main {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            padding: 2rem;
            transition: margin 0.3s;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .ab-sidebar { transform: translateX(-100%); }
            .ab-sidebar.open { transform: translateX(0); }
            .ab-mobile-header { display: flex; }
            .ab-main {
                margin-left: 0;
                padding: calc(var(--header-h) + 1.2rem) 1rem 1.5rem;
            }
        }
        @media (max-width: 576px) {
            .ab-main { padding: calc(var(--header-h) + 0.8rem) 0.75rem 1rem; }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- ===== MOBILE HEADER ===== -->
    <div class="ab-mobile-header" id="abMobileHeader">
        <button class="ab-hamburger" id="abHamburger" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>
        <span class="ab-mobile-title">{% block page_title %}Admin Panel{% endblock %}</span>
        <img src="{{ url_for('static', filename='images/logo/cc.png') }}" alt="Logo" class="ab-mobile-logo">
    </div>

    <!-- ===== OVERLAY ===== -->
    <div id="mobileMenuOverlay"></div>

    <!-- ===== SIDEBAR ===== -->
    {% include '_sidebar.html' %}

    <!-- ===== PAGE CONTENT ===== -->
    <div class="ab-main" id="abMain">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>



    {% block extra_scripts %}{% endblock %}
</body>
</html>
